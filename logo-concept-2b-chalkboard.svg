<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240">
  <!-- Chalkboard with erased content -->
  <!-- Outer wooden frame -->
  <rect x="15" y="30" width="190" height="150" rx="4" fill="#5c3d1a" stroke="#4a3015" stroke-width="2"/>
  <!-- Green chalkboard surface -->
  <rect x="25" y="40" width="170" height="130" rx="2" fill="#2d5a3a"/>
  <!-- Chalk dust / smudge marks where text was erased -->
  <ellipse cx="80" cy="70" rx="45" ry="8" fill="#4a7a5a" opacity="0.5"/>
  <ellipse cx="110" cy="90" rx="50" ry="7" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="90" cy="110" rx="40" ry="8" fill="#4a7a5a" opacity="0.35"/>
  <ellipse cx="105" cy="130" rx="35" ry="6" fill="#4a7a5a" opacity="0.3"/>
  <!-- Faint ghost text barely visible (erased but traces remain) -->
  <text x="45" y="73" font-family="Georgia, serif" font-size="11" fill="#3d6a4a" opacity="0.35">The history of this site</text>
  <text x="40" y="93" font-family="Georgia, serif" font-size="11" fill="#3d6a4a" opacity="0.25">includes the stories of the</text>
  <text x="55" y="113" font-family="Georgia, serif" font-size="11" fill="#3d6a4a" opacity="0.2">enslaved people who</text>
  <!-- Chalk tray -->
  <rect x="25" y="170" width="170" height="8" rx="2" fill="#5c3d1a"/>
  <!-- Eraser on tray -->
  <rect x="140" y="162" width="30" height="12" rx="2" fill="#888"/>
  <rect x="140" y="162" width="30" height="5" rx="1" fill="#666"/>
  <!-- Chalk piece on tray -->
  <rect x="50" y="165" width="20" height="5" rx="2" fill="#e8e0d0"/>
  <!-- Mounting screws -->
  <circle cx="25" cy="45" r="3" fill="#4a3015"/>
  <circle cx="195" cy="45" r="3" fill="#4a3015"/>
  <!-- Subtle "ERASED" watermark -->
  <text x="110" y="105" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#b91c1c" opacity="0.12" transform="rotate(-15, 110, 105)">ERASED</text>
</svg>