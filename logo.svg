<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <!-- NPS-style Wayside Interpretive Sign — wiped clean, with dashed outlines -->
  <!-- Angled sign panel (tilted like a real wayside) -->
  <g transform="rotate(-8, 120, 120)">
    <!-- Sign panel with brown NPS-style border -->
    <rect x="25" y="50" width="190" height="120" rx="4" fill="#3b2a14" stroke="#2a1d0e" stroke-width="2"/>
    <!-- Inner content area -->
    <rect x="32" y="57" width="176" height="106" rx="2" fill="#f5f0e6"/>
    <!-- Title bar area (NPS brown) -->
    <rect x="32" y="57" width="176" height="28" rx="2" fill="#3b2a14"/>
    <rect x="32" y="72" width="176" height="13" fill="#3b2a14"/>
    <!-- Title text (still visible) -->
    <text x="120" y="76" text-anchor="middle" fill="#f5f0e6" font-family="Georgia, serif" font-size="13" font-weight="700">PARK HISTORY</text>
    <!-- Missing content blocks — dashed outlines where text/images used to be -->
    <rect x="42" y="92" width="100" height="14" rx="2" fill="none" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>
    <rect x="42" y="112" width="100" height="14" rx="2" fill="none" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
    <rect x="42" y="132" width="70" height="14" rx="2" fill="none" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
    <!-- Missing image placeholder (right side) — dashed outline -->
    <rect x="152" y="92" width="48" height="56" rx="2" fill="none" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <!-- Small x in the image placeholder to suggest removed image -->
    <line x1="158" y1="100" x2="194" y2="140" stroke="#b91c1c" stroke-width="0.8" opacity="0.2"/>
    <line x1="194" y1="100" x2="158" y2="140" stroke="#b91c1c" stroke-width="0.8" opacity="0.2"/>
    <!-- Red "CENSORED" tape across the middle -->
    <rect x="42" y="114" width="156" height="18" rx="1" fill="#b91c1c" opacity="0.88"/>
    <text x="120" y="127" text-anchor="middle" fill="#ffffff" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="3">CENSORED</text>
  </g>
  <!-- Metal support post (angled) -->
  <rect x="108" y="170" width="8" height="75" rx="1" fill="#666" transform="rotate(-8, 112, 207)"/>
  <rect x="128" y="170" width="8" height="75" rx="1" fill="#666" transform="rotate(-8, 132, 207)"/>
  <!-- Ground base -->
  <ellipse cx="120" cy="245" rx="50" ry="6" fill="#8a7a5a" opacity="0.3"/>
</svg>