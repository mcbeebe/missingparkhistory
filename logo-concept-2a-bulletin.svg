<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" width="220" height="260">
  <!-- Ranger Station Bulletin Board -->
  <!-- Wooden frame -->
  <rect x="20" y="40" width="180" height="170" rx="3" fill="#8B6914" stroke="#6B4F12" stroke-width="2"/>
  <!-- Inner cork/board area -->
  <rect x="30" y="50" width="160" height="150" rx="2" fill="#d4a96a"/>
  <!-- Subtle cork texture dots -->
  <circle cx="50" cy="70" r="1" fill="#c49a5a" opacity="0.5"/>
  <circle cx="90" cy="85" r="1" fill="#c49a5a" opacity="0.5"/>
  <circle cx="140" cy="65" r="1" fill="#c49a5a" opacity="0.5"/>
  <circle cx="70" cy="150" r="1" fill="#c49a5a" opacity="0.5"/>
  <circle cx="160" cy="130" r="1" fill="#c49a5a" opacity="0.5"/>
  <circle cx="120" cy="170" r="1" fill="#c49a5a" opacity="0.5"/>
  <!-- Pinned notice 1 (still there, top-left) -->
  <rect x="38" y="58" width="52" height="40" rx="1" fill="#fafafa" transform="rotate(-2, 64, 78)"/>
  <circle cx="64" cy="58" r="3" fill="#b91c1c"/>
  <line x1="45" y1="68" x2="78" y2="68" stroke="#ccc" stroke-width="1.5"/>
  <line x1="45" y1="75" x2="72" y2="75" stroke="#ccc" stroke-width="1.5"/>
  <line x1="45" y1="82" x2="76" y2="82" stroke="#ccc" stroke-width="1.5"/>
  <!-- Pinned notice 2 (still there, top-right) -->
  <rect x="130" y="56" width="52" height="44" rx="1" fill="#fafafa" transform="rotate(1.5, 156, 78)"/>
  <circle cx="156" cy="56" r="3" fill="#2563b4"/>
  <line x1="138" y1="67" x2="172" y2="67" stroke="#ccc" stroke-width="1.5"/>
  <line x1="138" y1="74" x2="168" y2="74" stroke="#ccc" stroke-width="1.5"/>
  <line x1="138" y1="81" x2="170" y2="81" stroke="#ccc" stroke-width="1.5"/>
  <line x1="138" y1="88" x2="160" y2="88" stroke="#ccc" stroke-width="1.5"/>
  <!-- MISSING notice — empty rectangle with just a pin and faded outline -->
  <rect x="55" y="112" width="60" height="45" rx="1" fill="none" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="85" cy="112" r="3" fill="#b91c1c" opacity="0.4"/>
  <!-- Another missing notice — just a pin left behind -->
  <circle cx="152" cy="120" r="3" fill="#2563b4" opacity="0.35"/>
  <rect x="128" y="120" width="48" height="38" rx="1" fill="none" stroke="#2563b4" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
  <!-- Small torn corner fragment left behind from a ripped notice -->
  <path d="M38 160 L52 160 L38 172Z" fill="#fafafa" opacity="0.6"/>
  <circle cx="45" cy="158" r="2.5" fill="#b91c1c" opacity="0.3"/>
  <!-- Wooden post legs -->
  <rect x="55" y="210" width="12" height="40" rx="2" fill="#6B4F12"/>
  <rect x="153" y="210" width="12" height="40" rx="2" fill="#6B4F12"/>
</svg>