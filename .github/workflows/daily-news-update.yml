name: Daily NPS News Update

on:
  schedule:
    # 8:00 AM Pacific. GitHub cron is UTC — this is 15:00 UTC (PDT) and will
    # effectively run at 7 AM Pacific during Standard Time; acceptable drift.
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without writing or committing"
        required: false
        default: "false"
        type: boolean
      force:
        description: "Run even if banner already shows today"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-news-update
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.force  }}" = "true" ]; then ARGS="$ARGS --force";  fi
          python scripts/update_news.py $ARGS

      - name: Commit and push changes
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "NPS News Bot"
          git config user.email "bot@missingparkhistory.org"

          if git diff --quiet -- news-and-press.html index.html "News and Press/Archive"; then
            echo "No changes to commit."
            exit 0
          fi

          git add news-and-press.html index.html "News and Press/Archive"
          TODAY=$(date +%Y-%m-%d)
          git commit -m "news: auto-update ${TODAY}"
          git push origin HEAD:${GITHUB_REF_NAME}
